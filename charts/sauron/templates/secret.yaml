apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sauron.fullname" . }}-config
  labels:
    {{- include "sauron.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Telegram Configuration
  TELEGRAM_BOT_TOKEN: {{ required ".Values.telegram.botToken is required" .Values.telegram.botToken | quote }}
  TELEGRAM_CHANNEL_ID: {{ required ".Values.telegram.channelId is required" .Values.telegram.channelId | quote }}

  # LLM Configuration
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  LLM_API_KEY: {{ required ".Values.llm.apiKey is required" .Values.llm.apiKey | quote }}
  LLM_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  LLM_MAX_TOKENS: {{ .Values.llm.maxTokens | quote }}
  LLM_TEMPERATURE: {{ .Values.llm.temperature | quote }}

  # Storage Configuration
  DATA_DIR: {{ .Values.config.dataDir | quote }}
  ARTICLES_SUBDIR: {{ .Values.config.articlesSubdir | quote }}
  LOG_FILE: {{ .Values.config.logFile | quote }}

  # Application Configuration
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  PROCESSING_INTERVAL: {{ .Values.config.processingInterval | quote }}
